name: Build ByeDPIBg (Unsigned IPA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Xcode Project (Unsigned)
        run: |
          xcodebuild -project SwByeDPI.xcodeproj \
                     -scheme ByeDPIBg \
                     -sdk iphoneos \
                     -configuration Release \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     clean build

      - name: Create Unsigned IPA Package
        run: |
          mkdir -p Payload
          cp -r build_output/Build/Products/Release-iphoneos/ByeDPIBg.app Payload/
          zip -r ByeDPIBg_unsigned.ipa Payload

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ByeDPIBg-Unsigned-IPA
          path: ByeDPIBg_unsigned.ipa
