name: Build ByeDPIBg (Unsigned IPA)

on:
  workflow_dispatch: # Позволяет запускать сборку вручную одной кнопкой

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Disable Plugin and Macro Fingerprint Validation
        run: |
          # Отключаем валидацию отпечатков плагинов и макросов на системном уровне в macOS
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Build Xcode Project (Unsigned)
        run: |
          # Добавляем флаги -skipPackagePluginValidation и -skipMacroValidation для xcodebuild
          xcodebuild -project SwByeDPI.xcodeproj \
                     -scheme ByeDPIBg \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build_output \
                     -skipPackagePluginValidation \
                     -skipMacroValidation \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     clean build

      - name: Create Unsigned IPA Package
        run: |
          mkdir -p Payload
          # Копируем скомпилированное приложение .app в папку Payload
          cp -r build_output/Build/Products/Release-iphoneos/ByeDPI.app Payload/
          # Упаковываем в zip, переименовывая в .ipa
          zip -r ByeDPIBg_unsigned.ipa Payload

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ByeDPIBg-Unsigned-IPA
          path: ByeDPIBg_unsigned.ipa
